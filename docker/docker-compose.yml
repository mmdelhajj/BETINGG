version: '3.8'

services:
  # ─── Backend API ─────────────────────────────────────────
  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile.backend
    container_name: cryptobet-api
    restart: unless-stopped
    ports:
      - "4000:4000"
    env_file:
      - ../.env
    environment:
      - NODE_ENV=production
      - PORT=4000
      - DATABASE_URL=postgresql://cryptobet:${DB_PASSWORD}@postgres:5432/cryptobet
      - REDIS_URL=redis://redis:6379
      - FRONTEND_URL=http://frontend:3000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - cryptobet
    volumes:
      - uploads:/app/uploads

  # ─── Frontend ────────────────────────────────────────────
  frontend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.frontend
    container_name: cryptobet-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://app:4000
      - NEXT_PUBLIC_WS_URL=ws://app:4000
    depends_on:
      - app
    networks:
      - cryptobet

  # ─── PostgreSQL ──────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: cryptobet-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: cryptobet
      POSTGRES_USER: cryptobet
      POSTGRES_PASSWORD: ${DB_PASSWORD:-cryptobet_secret}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cryptobet"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - cryptobet

  # ─── Redis ──────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: cryptobet-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - cryptobet

  # ─── Nginx Reverse Proxy ─────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: cryptobet-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ssl_certs:/etc/nginx/ssl
    depends_on:
      - app
      - frontend
    networks:
      - cryptobet

  # ─── Adminer (DB Admin UI) ──────────────────────────────
  adminer:
    image: adminer
    container_name: cryptobet-adminer
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      ADMINER_DEFAULT_SERVER: postgres
    depends_on:
      - postgres
    networks:
      - cryptobet
    profiles:
      - dev

  # ─── Bull Board (Queue Monitor) ─────────────────────────
  bull-board:
    image: deadly0/bull-board
    container_name: cryptobet-bull-board
    restart: unless-stopped
    ports:
      - "3002:3000"
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      - redis
    networks:
      - cryptobet
    profiles:
      - dev

volumes:
  postgres_data:
  redis_data:
  uploads:
  ssl_certs:

networks:
  cryptobet:
    driver: bridge
