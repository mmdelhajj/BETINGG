name: CryptoBet CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'

jobs:
  # ===========================================================================
  # Lint — Check code style and static analysis
  # ===========================================================================
  lint:
    name: Lint (${{ matrix.project }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        project: [backend, frontend]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Cache node_modules
        uses: actions/cache@v4
        id: cache-deps
        with:
          path: ${{ matrix.project }}/node_modules
          key: ${{ runner.os }}-${{ matrix.project }}-deps-${{ hashFiles(format('{0}/package-lock.json', matrix.project)) }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.project }}-deps-

      - name: Install dependencies
        if: steps.cache-deps.outputs.cache-hit != 'true'
        working-directory: ${{ matrix.project }}
        run: npm ci

      - name: Generate Prisma client
        if: matrix.project == 'backend'
        working-directory: backend
        run: npx prisma generate

      - name: Run ESLint
        if: matrix.project == 'frontend'
        working-directory: frontend
        run: npm run lint

      - name: TypeScript check (informational)
        if: matrix.project == 'frontend'
        working-directory: frontend
        run: npx tsc --noEmit

  # ===========================================================================
  # Build — Verify frontend production build succeeds
  # ===========================================================================
  build:
    name: Build Frontend
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Cache node_modules
        uses: actions/cache@v4
        id: cache-deps
        with:
          path: frontend/node_modules
          key: ${{ runner.os }}-frontend-deps-${{ hashFiles('frontend/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-frontend-deps-

      - name: Install dependencies
        if: steps.cache-deps.outputs.cache-hit != 'true'
        working-directory: frontend
        run: npm ci

      - name: Build
        working-directory: frontend
        run: npm run build
        env:
          NEXT_TELEMETRY_DISABLED: 1

      - name: Verify build output
        working-directory: frontend
        run: test -d .next && echo "Frontend build output exists" || exit 1

  # ===========================================================================
  # Test — Run backend with database
  # ===========================================================================
  test:
    name: Test Backend
    runs-on: ubuntu-latest
    needs: lint

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: cryptobet_test
          POSTGRES_USER: cryptobet
          POSTGRES_PASSWORD: test_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U cryptobet"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    env:
      NODE_ENV: test
      DATABASE_URL: postgresql://cryptobet:test_password@localhost:5432/cryptobet_test?schema=public
      REDIS_URL: redis://localhost:6379
      JWT_SECRET: test-jwt-secret
      JWT_REFRESH_SECRET: test-jwt-refresh-secret
      FRONTEND_URL: http://localhost:3000

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Cache node_modules
        uses: actions/cache@v4
        id: cache-deps
        with:
          path: backend/node_modules
          key: ${{ runner.os }}-backend-deps-${{ hashFiles('backend/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-backend-deps-

      - name: Install dependencies
        if: steps.cache-deps.outputs.cache-hit != 'true'
        working-directory: backend
        run: npm ci

      - name: Generate Prisma client
        working-directory: backend
        run: npx prisma generate

      - name: Run database migrations
        working-directory: backend
        run: npx prisma migrate deploy

      - name: Verify backend starts
        working-directory: backend
        run: |
          npx tsx src/index.ts &
          SERVER_PID=$!
          sleep 10
          curl -sf http://localhost:3001/health || (kill $SERVER_PID 2>/dev/null; exit 1)
          echo "Backend health check passed"
          kill $SERVER_PID 2>/dev/null || true
